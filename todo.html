<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 600px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .header p {
            font-size: 0.95rem;
            opacity: 0.9;
        }

        .content {
            padding: 30px 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        #todoInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        #todoInput:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-add {
            padding: 12px 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-add:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-add:active {
            transform: translateY(0);
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 8px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #666;
            margin-top: 5px;
        }

        .todo-list {
            list-style: none;
            max-height: 400px;
            overflow-y: auto;
        }

        .todo-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 10px;
            background: white;
            transition: all 0.3s;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .todo-item:hover {
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transform: translateX(5px);
        }

        .todo-item.completed {
            background: #f0f8ff;
            opacity: 0.7;
        }

        .todo-item.completed .todo-text {
            text-decoration: line-through;
            color: #999;
        }

        .checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .todo-text {
            flex: 1;
            font-size: 1rem;
            color: #333;
            word-break: break-word;
        }

        .todo-date {
            font-size: 0.8rem;
            color: #999;
            white-space: nowrap;
        }

        .btn-delete {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.3s;
        }

        .btn-delete:hover {
            background: #ff5252;
        }

        .btn-edit {
            background: #ffa94d;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.3s;
            margin-right: 5px;
        }

        .btn-edit:hover {
            background: #ff922b;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 1.1rem;
            margin-bottom: 10px;
        }

        .empty-state small {
            font-size: 0.9rem;
            display: block;
            margin-top: 10px;
        }

        .clear-all-btn {
            width: 100%;
            padding: 12px;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.3s;
        }

        .clear-all-btn:hover {
            background: #ff5252;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: #333;
        }

        .modal-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .modal-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
        }

        .modal-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn-save {
            background: #667eea;
            color: white;
        }

        .modal-btn-save:hover {
            background: #5568d3;
        }

        .modal-btn-cancel {
            background: #e0e0e0;
            color: #333;
        }

        .modal-btn-cancel:hover {
            background: #d0d0d0;
        }

        @media (max-width: 480px) {
            .header h1 {
                font-size: 1.8rem;
            }

            .input-group {
                flex-direction: column;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .filter-buttons {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📝 My Tasks</h1>
            <p>Stay organized and productive</p>
        </div>

        <div class="content">
            <div class="input-group">
                <input 
                    type="text" 
                    id="todoInput" 
                    placeholder="Add a new task..." 
                    autocomplete="off"
                >
                <button class="btn-add" id="addBtn">Add</button>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-number" id="totalCount">0</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="completedCount">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-item">
                    <div class="stat-number" id="pendingCount">0</div>
                    <div class="stat-label">Pending</div>
                </div>
            </div>

            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="active">Active</button>
                <button class="filter-btn" data-filter="completed">Completed</button>
            </div>

            <ul class="todo-list" id="todoList"></ul>

            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 11H7v2h2V11zm4 0h-2v2h2V11zm4 0h-2v2h2V11zm2-7H3v14h14V4zm0-1H2v16h16V3z"/>
                </svg>
                <p>No tasks yet!</p>
                <small>Add a task to get started</small>
            </div>

            <button class="clear-all-btn" id="clearAllBtn">Clear Completed</button>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header">Edit Task</div>
            <input 
                type="text" 
                class="modal-input" 
                id="editInput" 
                placeholder="Update your task..."
            >
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-save" id="saveEditBtn">Save</button>
                <button class="modal-btn modal-btn-cancel" id="cancelEditBtn">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        // Local Storage Manager
        class TodoManager {
            constructor() {
                this.storageKey = 'todos';
                this.todos = this.loadFromStorage();
                this.currentFilter = 'all';
                this.editingId = null;
            }

            loadFromStorage() {
                try {
                    const stored = localStorage.getItem(this.storageKey);
                    return stored ? JSON.parse(stored) : [];
                } catch (e) {
                    console.error('Error loading from localStorage:', e);
                    return [];
                }
            }

            saveToStorage() {
                try {
                    localStorage.setItem(this.storageKey, JSON.stringify(this.todos));
                } catch (e) {
                    console.error('Error saving to localStorage:', e);
                }
            }

            addTodo(text) {
                if (!text.trim()) return false;

                const todo = {
                    id: Date.now(),
                    text: text.trim(),
                    completed: false,
                    createdAt: new Date().toLocaleDateString()
                };

                this.todos.push(todo);
                this.saveToStorage();
                return true;
            }

            deleteTodo(id) {
                this.todos = this.todos.filter(todo => todo.id !== id);
                this.saveToStorage();
            }

            toggleTodo(id) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.completed = !todo.completed;
                    this.saveToStorage();
                }
            }

            updateTodo(id, text) {
                const todo = this.todos.find(t => t.id === id);
                if (todo) {
                    todo.text = text.trim();
                    this.saveToStorage();
                }
            }

            clearCompleted() {
                this.todos = this.todos.filter(todo => !todo.completed);
                this.saveToStorage();
            }

            getFilteredTodos() {
                switch (this.currentFilter) {
                    case 'active':
                        return this.todos.filter(todo => !todo.completed);
                    case 'completed':
                        return this.todos.filter(todo => todo.completed);
                    default:
                        return this.todos;
                }
            }

            getStats() {
                return {
                    total: this.todos.length,
                    completed: this.todos.filter(t => t.completed).length,
                    pending: this.todos.filter(t => !t.completed).length
                };
            }
        }

        // UI Manager
        class TodoUI {
            constructor(manager) {
                this.manager = manager;
                this.todoInput = document.getElementById('todoInput');
                this.addBtn = document.getElementById('addBtn');
                this.todoList = document.getElementById('todoList');
                this.emptyState = document.getElementById('emptyState');
                this.clearAllBtn = document.getElementById('clearAllBtn');
                this.filterBtns = document.querySelectorAll('.filter-btn');
                this.editModal = document.getElementById('editModal');
                this.editInput = document.getElementById('editInput');
                this.saveEditBtn = document.getElementById('saveEditBtn');
                this.cancelEditBtn = document.getElementById('cancelEditBtn');

                this.initEventListeners();
                this.render();
            }

            initEventListeners() {
                this.addBtn.addEventListener('click', () => this.handleAddTodo());
                this.todoInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') this.handleAddTodo();
                });

                this.filterBtns.forEach(btn => {
                    btn.addEventListener('click', (e) => this.handleFilter(e.target.dataset.filter));
                });

                this.clearAllBtn.addEventListener('click', () => this.handleClearCompleted());
                this.cancelEditBtn.addEventListener('click', () => this.closeEditModal());
                this.saveEditBtn.addEventListener('click', () => this.handleSaveEdit());
            }

            handleAddTodo() {
                const text = this.todoInput.value;
                if (this.manager.addTodo(text)) {
                    this.todoInput.value = '';
                    this.todoInput.focus();
                    this.render();
                }
            }

            handleFilter(filter) {
                this.manager.currentFilter = filter;
                this.filterBtns.forEach(btn => btn.classList.remove('active'));
                document.querySelector(`[data-filter="${filter}"]`).classList.add('active');
                this.render();
            }

            handleClearCompleted() {
                if (confirm('Are you sure you want to clear all completed tasks?')) {
                    this.manager.clearCompleted();
                    this.render();
                }
            }

            handleToggleTodo(id) {
                this.manager.toggleTodo(id);
                this.render();
            }

            handleDeleteTodo(id) {
                if (confirm('Delete this task?')) {
                    this.manager.deleteTodo(id);
                    this.render();
                }
            }

            openEditModal(id) {
                const todo = this.manager.todos.find(t => t.id === id);
                if (todo) {
                    this.manager.editingId = id;
                    this.editInput.value = todo.text;
                    this.editModal.classList.add('active');
                    this.editInput.focus();
                }
            }

            closeEditModal() {
                this.editModal.classList.remove('active');
                this.manager.editingId = null;
                this.editInput.value = '';
            }

            handleSaveEdit() {
                if (this.manager.editingId !== null) {
                    const newText = this.editInput.value;
                    if (newText.trim()) {
                        this.manager.updateTodo(this.manager.editingId, newText);
                        this.closeEditModal();
                        this.render();
                    }
                }
            }

            updateStats() {
                const stats = this.manager.getStats();
                document.getElementById('totalCount').textContent = stats.total;
                document.getElementById('completedCount').textContent = stats.completed;
                document.getElementById('pendingCount').textContent = stats.pending;
            }

            render() {
                this.todoList.innerHTML = '';
                const filteredTodos = this.manager.getFilteredTodos();

                if (filteredTodos.length === 0) {
                    this.emptyState.style.display = 'block';
                } else {
                    this.emptyState.style.display = 'none';
                    filteredTodos.forEach(todo => {
                        const li = document.createElement('li');
                        li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
                        li.innerHTML = `
                            <input 
                                type="checkbox" 
                                class="checkbox" 
                                ${todo.completed ? 'checked' : ''}
                            >
                            <span class="todo-text">${this.escapeHtml(todo.text)}</span>
                            <span class="todo-date">${todo.createdAt}</span>
                            <button class="btn-edit">Edit</button>
                            <button class="btn-delete">Delete</button>
                        `;

                        const checkbox = li.querySelector('.checkbox');
                        const editBtn = li.querySelector('.btn-edit');
                        const deleteBtn = li.querySelector('.btn-delete');

                        checkbox.addEventListener('change', () => this.handleToggleTodo(todo.id));
                        editBtn.addEventListener('click', () => this.openEditModal(todo.id));
                        deleteBtn.addEventListener('click', () => this.handleDeleteTodo(todo.id));

                        this.todoList.appendChild(li);
                    });
                }

                this.updateStats();
            }

            escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }
        }

        // Initialize app
        const manager = new TodoManager();
        const ui = new TodoUI(manager);
    </script>
</body>
</html>
